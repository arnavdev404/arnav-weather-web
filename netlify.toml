[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/weather"
  to = "/.netlify/functions/weather?endpoint=weather"
  status = 200
  force = true

[[redirects]]
  from = "/api/forecast"
  to = "/.netlify/functions/weather?endpoint=forecast"
  status = 200
  force = true

[[redirects]]
  from = "/api/geocode"
  to = "/.netlify/functions/weather?endpoint=geocode"
  status = 200
  force = true

[[redirects]]
  from = "/api/air-quality"
  to = "/.netlify/functions/weather?endpoint=air-quality"
  status = 200
  force = true